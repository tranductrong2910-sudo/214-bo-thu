    <style>
        body { 
            font-family: 'Lexend', sans-serif; 
            background: #fff5f7; 
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 228, 230, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(220, 252, 231, 0.5) 0px, transparent 50%);
        }
        .hanzi-font { font-family: 'Noto Sans SC', sans-serif; }
        .fancy-title { font-family: 'Pattaya', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #fecdd3;
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            border-color: #fb7185;
            box-shadow: 0 15px 30px -10px rgba(251, 113, 133, 0.3);
            transform: translateY(-5px) scale(1.05);
            background: #ffffff;
        }
        .category-pill {
            transition: all 0.3s;
            cursor: pointer;
            border-radius: 999px;
            font-size: 0.9rem;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
        }
        .category-pill.active {
            background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }
        .grid-bg {
            background-image: radial-gradient(#fda4af 1px, transparent 1px);
            background-size: 24px 24px;
        }
        #writer-target svg { border-radius: 2rem; }
        .flower-icon { display: inline-block; animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Ẩn thanh cuộn nhưng vẫn cho phép cuộn */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .example-tag {
            background: #fff1f2;
            color: #475569; /* Slate 600 for text */
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px solid #ffe4e6;
        }
        .example-char {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.8rem;
            color: #e11d48; /* Rose 600 */
            font-weight: 900;
            margin-right: 8px;

        }));

        let writer = null;
        let filter = 'all';

        function setFilter(f) {
            filter = f;
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${f}`).classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const search = document.getElementById('searchInput').value.toLowerCase();

            const items = radicals.filter(r => {
                const matchSearch = r.char.includes(search) || r.hv.toLowerCase().includes(search) || r.mean.toLowerCase().includes(search);
                const matchCat = filter === 'all' || r.cat === filter;
                return matchSearch && matchCat;
            });

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "glass-card p-6 text-center cursor-pointer flex flex-col items-center justify-center";
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <span class="text-5xl hanzi-font mb-4 text-slate-800">${item.char}</span>
                    <span class="text-sm font-black text-rose-500 uppercase tracking-widest">${item.hv}</span>
                    <span class="text-xs text-slate-400 font-bold truncate w-full mt-1">${item.mean}</span>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(item) {
            document.getElementById('mPinyin').innerText = item.pinyin;
            document.getElementById('mHV').innerText = item.hv;
            document.getElementById('mMean').innerText = item.mean;
            document.getElementById('mDesc').innerText = item.desc;
            
            const exDiv = document.getElementById('mExamples');
            exDiv.innerHTML = '';
            item.examples.forEach(ex => {
                // Tách chữ Hán và phần giải thích
                const parts = ex.split(' (');
                const charPart = parts[0];
                const restPart = parts[1] ? `(${parts[1]}` : '';

                const tag = document.createElement('div');
                tag.className = "example-tag";
                tag.innerHTML = `<span class="example-char">${charPart}</span><span>${restPart}</span>`;
                exDiv.appendChild(tag);
            });

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('writer-target').innerHTML = '';
            
            writer = HanziWriter.create('writer-target', item.char, {
                width: 180, height: 180, padding: 0,
                strokeColor: '#f43f5e', outlineColor: '#fff1f2',
                radicalColor: '#10b981'
            });
            writer.animateCharacter();

            document.getElementById('btnCharSpeak').onclick = () => {
                const ut = new SpeechSynthesisUtterance(item.char);
                ut.lang = 'zh-CN';
                window.speechSynthesis.speak(ut);
            };
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        const filterBox = document.getElementById('catFilter');
        Object.entries(categories).forEach(([id, label]) => {
            const btn = document.createElement('button');
            btn.id = `btn-${id}`;

            btn.onclick = () => setFilter(id);
            filterBox.appendChild(btn);
        });
